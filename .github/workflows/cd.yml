name: CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read

    env:
      AWS_HOST: ${{ secrets.AWS_HOST }}
      AWS_USER: ${{ secrets.AWS_USER }}
      AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
      AWS_SSH_KNOWN_HOSTS: ${{ secrets.AWS_SSH_KNOWN_HOSTS }}
      AWS_PORT: ${{ secrets.AWS_PORT }}
      AWS_APP_DIR: ${{ secrets.AWS_APP_DIR }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
      AWS_GITHUB_ROLE_ARN: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
      AWS_CONTAINER_NAME: ${{ secrets.AWS_CONTAINER_NAME }}
      AWS_APP_PORT: ${{ secrets.AWS_APP_PORT }}
      AWS_APP_NETWORK: ${{ secrets.AWS_APP_NETWORK }}
      APP_ENV_VARS: ${{ secrets.APP_ENV_VARS }}
      JUDGE_JWT_AUTH_SIGNING_KEY: ${{ secrets.JUDGE_JWT_AUTH_SIGNING_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_USER: ${{ secrets.MONGODB_USER }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      MONGODB_DATABASE: ${{ secrets.MONGODB_DATABASE }}
      MONGODB_PORT: ${{ secrets.MONGODB_PORT }}
      MONGODB_IMAGE: ${{ secrets.MONGODB_IMAGE }}
      MONGODB_CONTAINER_NAME: ${{ secrets.MONGODB_CONTAINER_NAME }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      JUDGE_PROBLEM_EVENTS_QUEUE_URL: ${{ secrets.JUDGE_PROBLEM_EVENTS_QUEUE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SemVer Tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${GITHUB_REF_NAME}"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate Required Secrets
        run: |
          set -euo pipefail
          required_vars=(
            AWS_HOST
            AWS_USER
            AWS_SSH_KEY
            AWS_REGION
            AWS_ACCOUNT_ID
            AWS_ECR_REPOSITORY
            AWS_GITHUB_ROLE_ARN
            JUDGE_JWT_AUTH_SIGNING_KEY
            MONGODB_USER
            MONGODB_PASSWORD
            MONGODB_DATABASE
          )
          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required value: ${name}"
              exit 1
            fi
          done

      - name: Run Tests
        run: ./gradlew --no-daemon test

      - name: Build Boot JAR
        run: ./gradlew --no-daemon clean bootJar

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image URI
        run: |
          set -euo pipefail
          IMAGE_TAG="${GITHUB_REF_NAME}"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${AWS_ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push App Image (linux/arm64)
        run: |
          set -euo pipefail
          JAR_PATH="$(ls build/libs/*.jar | grep -v 'plain' | head -n 1)"
          if [[ -z "${JAR_PATH}" ]]; then
            echo "Boot JAR not found"
            exit 1
          fi
          cp "${JAR_PATH}" app.jar

          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t "${IMAGE_URI}" \
            .

      - name: Encode Runtime Values
        run: |
          set -euo pipefail
          encode_and_export() {
            local key="$1"
            local value="${!key:-}"
            local encoded
            encoded="$(printf "%s" "${value}" | base64 | tr -d '\n')"
            echo "${key}_B64=${encoded}" >> "${GITHUB_ENV}"
          }

          encode_and_export APP_ENV_VARS
          encode_and_export JUDGE_JWT_AUTH_SIGNING_KEY
          encode_and_export MONGODB_URI
          encode_and_export MONGODB_USER
          encode_and_export MONGODB_PASSWORD
          encode_and_export MONGODB_DATABASE
          encode_and_export MONGODB_PORT
          encode_and_export MONGODB_IMAGE
          encode_and_export MONGODB_CONTAINER_NAME
          encode_and_export REDIS_PASSWORD
          encode_and_export JUDGE_PROBLEM_EVENTS_QUEUE_URL

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "${AWS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${AWS_PORT:-22}"
          if [[ -n "${AWS_SSH_KNOWN_HOSTS}" ]]; then
            printf "%s\n" "${AWS_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PORT}" -H "${AWS_HOST}" > ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Remote Deploy Container
        run: |
          set -euo pipefail
          PORT="${AWS_PORT:-22}"
          APP_DIR="${AWS_APP_DIR:-/home/${AWS_USER}/online-judge}"
          CONTAINER_NAME="${AWS_CONTAINER_NAME:-online-judge}"
          APP_PORT="${AWS_APP_PORT:-8080}"
          APP_NETWORK="${AWS_APP_NETWORK:-online-judge-net}"

          ssh -p "${PORT}" "${AWS_USER}@${AWS_HOST}" \
            "AWS_APP_DIR='${APP_DIR}' AWS_REGION='${AWS_REGION}' AWS_ACCOUNT_ID='${AWS_ACCOUNT_ID}' AWS_ECR_REPOSITORY='${AWS_ECR_REPOSITORY}' IMAGE_URI='${IMAGE_URI}' AWS_CONTAINER_NAME='${CONTAINER_NAME}' AWS_APP_PORT='${APP_PORT}' AWS_APP_NETWORK='${APP_NETWORK}' APP_ENV_VARS_B64='${APP_ENV_VARS_B64}' JUDGE_JWT_AUTH_SIGNING_KEY_B64='${JUDGE_JWT_AUTH_SIGNING_KEY_B64}' MONGODB_URI_B64='${MONGODB_URI_B64}' MONGODB_USER_B64='${MONGODB_USER_B64}' MONGODB_PASSWORD_B64='${MONGODB_PASSWORD_B64}' MONGODB_DATABASE_B64='${MONGODB_DATABASE_B64}' MONGODB_PORT_B64='${MONGODB_PORT_B64}' MONGODB_IMAGE_B64='${MONGODB_IMAGE_B64}' MONGODB_CONTAINER_NAME_B64='${MONGODB_CONTAINER_NAME_B64}' REDIS_PASSWORD_B64='${REDIS_PASSWORD_B64}' JUDGE_PROBLEM_EVENTS_QUEUE_URL_B64='${JUDGE_PROBLEM_EVENTS_QUEUE_URL_B64}' bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p "${AWS_APP_DIR}"
          if [[ ! -w "${AWS_APP_DIR}" ]]; then
            echo "AWS_APP_DIR is not writable: ${AWS_APP_DIR}"
            echo "Set AWS_APP_DIR secret to a writable path (example: /home/<user>/online-judge)"
            exit 1
          fi

          if ! command -v aws >/dev/null 2>&1; then
            echo "aws CLI is required on EC2 host"
            exit 1
          fi
          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is required on EC2 host"
            exit 1
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose plugin is required on EC2 host"
            exit 1
          fi

          decode_b64() {
            local encoded="${1:-}"
            if [[ -z "${encoded}" ]]; then
              printf ""
            else
              printf "%s" "${encoded}" | base64 --decode
            fi
          }

          APP_ENV_VARS="$(decode_b64 "${APP_ENV_VARS_B64:-}")"
          JUDGE_JWT_AUTH_SIGNING_KEY="$(decode_b64 "${JUDGE_JWT_AUTH_SIGNING_KEY_B64:-}")"
          MONGODB_URI="$(decode_b64 "${MONGODB_URI_B64:-}")"
          MONGODB_USER="$(decode_b64 "${MONGODB_USER_B64:-}")"
          MONGODB_PASSWORD="$(decode_b64 "${MONGODB_PASSWORD_B64:-}")"
          MONGODB_DATABASE="$(decode_b64 "${MONGODB_DATABASE_B64:-}")"
          MONGODB_PORT="$(decode_b64 "${MONGODB_PORT_B64:-}")"
          MONGODB_IMAGE="$(decode_b64 "${MONGODB_IMAGE_B64:-}")"
          MONGODB_CONTAINER_NAME="$(decode_b64 "${MONGODB_CONTAINER_NAME_B64:-}")"
          REDIS_PASSWORD="$(decode_b64 "${REDIS_PASSWORD_B64:-}")"
          JUDGE_PROBLEM_EVENTS_QUEUE_URL="$(decode_b64 "${JUDGE_PROBLEM_EVENTS_QUEUE_URL_B64:-}")"

          app_env_keys=()

          has_env_key() {
            local target="$1"
            local item
            for item in "${app_env_keys[@]}"; do
              if [[ "${item}" == "${target}" ]]; then
                return 0
              fi
            done
            return 1
          }

          register_env_key() {
            local key="$1"
            if ! has_env_key "${key}"; then
              app_env_keys+=("${key}")
            fi
          }

          append_runtime_env() {
            local key="$1"
            local value="${2:-}"
            local required="${3:-false}"

            if [[ "${required}" == "true" && -z "${value}" ]]; then
              echo "Missing required runtime env: ${key}"
              exit 1
            fi
            if [[ -n "${value}" ]]; then
              export "${key}=${value}"
              register_env_key "${key}"
            fi
          }

          if [[ -n "${APP_ENV_VARS}" ]]; then
            while IFS= read -r line; do
              line="${line%$'\r'}"
              if [[ -z "${line}" || "${line}" =~ ^[[:space:]]*# ]]; then
                continue
              fi
              if [[ "${line}" != *=* ]]; then
                continue
              fi
              key="${line%%=*}"
              value="${line#*=}"
              export "${key}=${value}"
              register_env_key "${key}"
            done <<< "${APP_ENV_VARS}"
          fi

          append_runtime_env "JUDGE_JWT_AUTH_SIGNING_KEY" "${JUDGE_JWT_AUTH_SIGNING_KEY}" "true"
          append_runtime_env "MONGODB_USER" "${MONGODB_USER}" "true"
          append_runtime_env "MONGODB_PASSWORD" "${MONGODB_PASSWORD}" "true"
          append_runtime_env "MONGODB_DATABASE" "${MONGODB_DATABASE}" "true"
          append_runtime_env "MONGODB_PORT" "${MONGODB_PORT}"
          append_runtime_env "MONGODB_IMAGE" "${MONGODB_IMAGE}"
          append_runtime_env "MONGODB_CONTAINER_NAME" "${MONGODB_CONTAINER_NAME}"
          append_runtime_env "REDIS_PASSWORD" "${REDIS_PASSWORD}"
          append_runtime_env "JUDGE_PROBLEM_EVENTS_QUEUE_URL" "${JUDGE_PROBLEM_EVENTS_QUEUE_URL}"

          # Always use internal Docker DNS names for runtime dependencies.
          # Also override Spring direct keys to prevent APP_ENV_VARS from injecting localhost endpoints.
          INTERNAL_MONGODB_URI="mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/${MONGODB_DATABASE}?authSource=admin"
          append_runtime_env "MONGODB_URI" "${INTERNAL_MONGODB_URI}"
          append_runtime_env "SPRING_DATA_MONGODB_URI" "${INTERNAL_MONGODB_URI}"
          append_runtime_env "REDIS_HOST" "redis"
          append_runtime_env "REDIS_PORT" "6379"
          append_runtime_env "SPRING_DATA_REDIS_HOST" "redis"
          append_runtime_env "SPRING_DATA_REDIS_PORT" "6379"

          APP_DOCKER_NETWORK="${AWS_APP_NETWORK:-online-judge-net}"
          export APP_DOCKER_NETWORK IMAGE_URI
          export AWS_CONTAINER_NAME AWS_APP_PORT

          {
            printf '%s\n' \
              'services:' \
              '  mongodb:' \
              '    image: ${MONGODB_IMAGE:-mongo:8}' \
              '    container_name: ${MONGODB_CONTAINER_NAME:-judge-mongodb}' \
              '    restart: unless-stopped' \
              '    ports:' \
              '      - "${MONGODB_PORT:-27017}:27017"' \
              '    environment:' \
              '      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}' \
              '      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}' \
              '      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}' \
              '    volumes:' \
              '      - mongo_data:/data/db' \
              '    networks:' \
              '      - app_net' \
              '    healthcheck:' \
              "      test: [\"CMD\", \"mongosh\", \"--eval\", \"db.adminCommand('ping')\"]" \
              '      interval: 10s' \
              '      timeout: 5s' \
              '      retries: 5' \
              '' \
              '  redis:' \
              '    image: ${REDIS_IMAGE:-redis:7-alpine}' \
              '    container_name: ${REDIS_CONTAINER_NAME:-judge-redis}' \
              '    restart: unless-stopped' \
              '    ports:' \
              '      - "${REDIS_PORT:-6379}:6379"' \
              '    networks:' \
              '      - app_net' \
              '    healthcheck:' \
              '      test: ["CMD", "redis-cli", "ping"]' \
              '      interval: 10s' \
              '      timeout: 5s' \
              '      retries: 5' \
              '' \
              '  app:' \
              '    image: ${IMAGE_URI}' \
              '    container_name: ${AWS_CONTAINER_NAME}' \
              '    restart: unless-stopped' \
              '    ports:' \
              '      - "${AWS_APP_PORT}:8080"' \
              '    networks:' \
              '      - app_net' \
              '    volumes:' \
              '      - /var/run/docker.sock:/var/run/docker.sock' \
              '    environment:'
            for key in "${app_env_keys[@]}"; do
              printf '      - %s=${%s}\n' "${key}" "${key}"
            done
            printf '%s\n' \
              '      - MONGODB_URI=${MONGODB_URI:-mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/${MONGODB_DATABASE}?authSource=admin}' \
              '      - SPRING_DATA_MONGODB_URI=${SPRING_DATA_MONGODB_URI:-mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/${MONGODB_DATABASE}?authSource=admin}' \
              '      - REDIS_HOST=${REDIS_HOST:-redis}' \
              '      - REDIS_PORT=${REDIS_PORT:-6379}' \
              '      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis}' \
              '      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}'
            printf '%s\n' \
              'networks:' \
              '  app_net:' \
              '    name: ${APP_DOCKER_NETWORK}' \
              '' \
              'volumes:' \
              '  mongo_data:'
          } > "${AWS_APP_DIR}/docker-compose.yml"

          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          docker compose -f "${AWS_APP_DIR}/docker-compose.yml" pull app
          docker compose -f "${AWS_APP_DIR}/docker-compose.yml" up -d mongodb redis app
          EOF
